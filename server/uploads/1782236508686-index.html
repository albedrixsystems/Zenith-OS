<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    
</head>
<body>

    <div class="card">
        <h2>Counter</h2>
        <div id="num">0</div><br>
        
        <div class="buttons">
            <div class="row">
                <button class="dec" id="decBtn">Decrement</button>
                <button class="inc" id="incBtn">Increment</button>
            </div><br>
            <button class="reset" id="resetBtn">Reset</button><br><br>
            <div id="surp">I want to Tell you Something Click the Button 👇</div><br>
            <button class="Press" id="wishBtn">Click Me 😊</button>
        </div>
    </div>

    <script>
        let score = 0;

        const numDisplay = document.getElementById('num');
        const incBtn = document.getElementById('incBtn');
        const decBtn = document.getElementById('decBtn');
        const resetBtn = document.getElementById('resetBtn');
        const wishBtn = document.getElementById('wishBtn');
        const surpDisplay = document.getElementById('surp');

        function updateScreen() {

            numDisplay.textContent = score;

            if (score > 0) {
                document.body.style.backgroundColor = "#008000";
            } else if (score < 0) {
                document.body.style.backgroundColor = "#FF0000";
            } else {
                document.body.style.backgroundColor = "#8E8E8E";
            }
        }

        incBtn.addEventListener('click', () => {
            score++;
            updateScreen();
        });

        decBtn.addEventListener('click', () => {
            score--;
            updateScreen();
        });

        resetBtn.addEventListener('click', () => {
            score = 0;
            updateScreen();
        });

        function wish(){
            surpDisplay.textContent = A;

        }

        wishBtn.addEventListener('click', () => {
            A = "Happy Birthday to You 🎉🎂";
            wish();
        })
    </script>

</body>
</html>
